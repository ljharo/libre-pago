name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry' # Cache automático de dependencias

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run Ruff (Lint & Format)
        run: poetry run ruff check .

      - name: Run mypy (Tipado)
        run: poetry run mypy app # Sin || true, ¡queremos ver errores!

  backend-test:
    runs-on: ubuntu-latest
    needs: [backend-lint] # Solo corre si el linting pasa
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_librepago
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_librepago
          API_KEY: test-api-key
        run: poetry run pytest -v

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Cache de node_modules
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci # 'npm ci' es más rápido y seguro para CI que 'npm install'

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit

  build-check:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint]
    steps:
      - run: echo "Todo validado. Listo para deploy."
