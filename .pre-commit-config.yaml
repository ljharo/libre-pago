repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=10000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.14
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black]
        files: ^backend/

  - repo: local
    hooks:
      - id: frontend-build
        name: Frontend Build
        entry: npm run build
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]
        files: ^frontend/
        description: Check if frontend builds

      - id: backend-tests
        name: Backend Tests
        entry: poetry run pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]
        files: ^backend/
        description: Run backend tests
