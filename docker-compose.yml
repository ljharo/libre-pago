version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    networks:
      - libre_pago_net
    env_file: .env
    ports:
      - "5432:5432"
    environment:
      # Mapeo necesario para la imagen oficial de Postgres
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - libre_pago_net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - libre_pago_net
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      db_host: db
      redis_host: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:
        VITE_API_KEY:
    networks:
      - libre_pago_net
    ports:
      - "3001:3001"
    depends_on:
      - api
    restart: unless-stopped

networks:
  libre_pago_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
