version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./librepago.db
      API_KEY: ${API_KEY:-your-secure-api-key-change-me}
      DEBUG: "false"
    volumes:
      - ./app:/app/app
      - ./librepago.db:/app/librepago.db
    command: >
      sh -c "python -m alembic upgrade head &&
             python -m app.seed &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"