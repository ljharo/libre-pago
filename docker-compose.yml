version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      API_KEY: ${API_KEY}
      DEBUG: "false"
    command: >
      sh -c "python -m alembic upgrade head &&
             python -m app.seed &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    restart: unless-stopped
